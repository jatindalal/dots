env:
  TERM: xterm-256color
  WINIT_X11_SCALE_FACTOR: "1"
window:
  padding:
    x: 2
    y: 2
  dynamic_padding: false
  dimensions:
    columns: 100
    lines: 26
  opacity: 0.95
font:
  normal:
    family: JetBrains Mono 
    style: Medium
  size: 14
colors:
  primary:
    background: '0x111111'
  cursor:
    text: '0x000000'
    cursor: '#cc2222'
cursor:
  style:
    shape: Underline
